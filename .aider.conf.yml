# .aider.conf.yml
model: mistral/mistral-large-latest

# Load specific files (Aider will automatically handle .md and .txt)
file:
  - Instructions/WORLD.md
  - Instructions/SETTLEMENTS.md
  - Instructions/MAGIC.md
  - Instructions/CHARACTERS.md

# BEHAVIOR
auto-commits: false
chat-mode: architect

# ANALYTICS
analytics: false